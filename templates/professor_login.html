<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professor Login — ProofFolio</title>
  <meta name="description" content="Secure professor login for ProofFolio dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0F1E;
      --surface: #111827;
      --surface2: #1E293B;
      --border: #1E2D45;
      --accent: #7C3AED;
      --accent-light: #8B5CF6;
      --accent-glow: rgba(124,58,237,0.3);
      --text: #E2E8F0;
      --muted: #94A3B8;
      --danger: #F87171;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(59,130,246,0.08) 0%, transparent 60%);
    }

    /* ── Floating card ── */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.8rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.06),
        0 32px 72px rgba(0,0,0,0.55);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.45s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #7C3AED, #3B82F6, #7C3AED);
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── Icon lockup ── */
    .icon-wrap {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(59,130,246,0.2));
      border: 1px solid rgba(124,58,237,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.4rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    /* Flash */
    .flash {
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.35);
      color: var(--danger);
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.4rem;
    }

    /* ── Fields ── */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: 1.1rem;
    }

    label {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      width: 100%;
    }

    input::placeholder { color: #475569; }

    input:focus {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.45);
    }

    .btn-login:hover {
      filter: brightness(1.12);
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.55);
    }

    .btn-login:active { transform: translateY(0); }

    .back-link {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .back-link a {
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="icon-wrap">🔐</div>
    <h1>Professor Login</h1>
    <p class="subtitle">Access the ProofFolio dashboard</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash">⚠ {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/professor/login">
      <div class="form-field">
        <label for="email">Email Address</label>
        <input id="email" type="email" name="email" placeholder="prof@prooffolio.com" required autocomplete="email" />
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="••••••••••" required autocomplete="current-password" />
      </div>

      <button id="loginBtn" class="btn-login" type="submit">Sign In</button>
    </form>

    <p class="back-link">← <a href="/">Back to student portal</a></p>
  </div>

  <script>
    const form = document.querySelector('form');
    const btn  = document.getElementById('loginBtn');
    form.addEventListener('submit', () => {
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      btn.style.opacity = '0.7';
    });
  </script>

</body>
</html>
